<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Customer Dashboard | Smile AI Web Studio</title>

<meta name="description"
content="Smile AI Web Studio Customer Dashboard">

<meta name="robots"
content="noindex,nofollow">

<meta name="theme-color"
content="#2563eb">

<link rel="icon"
href="assets/favicon.png">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet"
href="css/customer-dashboard.css">

</head>

<body>

<!-- Loader -->

<div id="loader">

<div class="loader-box">

<div class="loader-circle"></div>

<h3>Loading Dashboard...</h3>

</div>

</div>

<!-- App -->

<div id="dashboardApp">

<!-- Sidebar -->

<aside id="sidebar">

<div class="sidebar-top">

<div class="logo">

<img
src="assets/logo.png"
id="companyLogo">

<h2>

Smile AI

</h2>

</div>

<button id="sidebarToggle">

<i class="fa-solid fa-bars"></i>

</button>

</div>

<!-- User -->

<div class="sidebar-user">

<img

id="userPhoto"

src="assets/default-user.png"

alt="User">

<h3 id="sidebarUserName">

Loading...

</h3>

<p id="sidebarUserEmail">

Loading...

</p>

</div>

<!-- Menu -->

<nav>

<ul>

<li>

<a
href="#dashboard"
id="menuDashboard">

<i class="fa-solid fa-house"></i>

Dashboard

</a>

</li>

<li>

<a
href="#websites"
id="menuWebsites">

<i class="fa-solid fa-globe"></i>

My Websites

</a>

</li>

<li>

<a
href="#orders"
id="menuOrders">

<i class="fa-solid fa-cart-shopping"></i>

Orders

</a>

</li>

<li>

<a
href="#invoice"
id="menuInvoices">

<i class="fa-solid fa-file-invoice"></i>

Invoices

</a>

</li>

<li>

<a
href="#wallet"
id="menuWallet">

<i class="fa-solid fa-wallet"></i>

Wallet

</a>

</li>

<li>

<a
href="#support"
id="menuSupport">

<i class="fa-solid fa-headset"></i>

Support

</a>

</li>

<li>

<a
href="#profile"
id="menuProfile">

<i class="fa-solid fa-user"></i>

Profile

</a>

</li>

<li>

<button id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

</li>

</ul>

</nav>

</aside>

<!-- Main -->

<div id="mainContent">

<!-- Header -->

<header id="topHeader">

<div class="left">

<button id="mobileMenu">

<i class="fa-solid fa-bars"></i>

</button>

<h1>

Customer Dashboard

</h1>

</div>

<div class="right">

<div class="searchBox">

<input

type="search"

id="searchWebsite"

placeholder="Search Website...">

<i class="fa-solid fa-search"></i>

</div>

<button id="notificationBtn">

<i class="fa-solid fa-bell"></i>

<span id="notificationCount">

0

</span>

</button>

<button id="darkModeToggle">

<i class="fa-solid fa-moon"></i>

</button>

<div class="profileArea">

<img

id="headerUserPhoto"

src="assets/default-user.png">

<div>

<h4 id="userName">

Loading...

</h4>

<p id="userEmail">

Loading...

</p>

</div>

</div>

</div>

</header>

<!-- Main Area -->

<main id="dashboardContent">
